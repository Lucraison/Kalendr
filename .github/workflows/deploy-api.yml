name: Deploy API

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          # Deploy runs as the chalk service user, not root. chalk owns the
          # repo and the publish dir, and has a narrow sudoers rule
          # (/etc/sudoers.d/chalk-deploy) that allows only:
          #   sudo /bin/systemctl restart kalendr
          username: chalk
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/Kalendr
            git pull
            cd Kalendr.API
            /usr/bin/dotnet publish -c Release -o /opt/kalendr/publish
            sudo /bin/systemctl restart kalendr
