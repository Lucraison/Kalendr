name: Build Android APK

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable

      - name: Install dependencies
        run: flutter pub get
        working-directory: kalendr_app

      - name: Build APK
        run: flutter build apk --release
        working-directory: kalendr_app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kalendr-android
          path: kalendr_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: kalendr_app/build/app/outputs/flutter-apk/app-release.apk
          body: Latest build of Kalendr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
