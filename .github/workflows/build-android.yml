name: Build Android

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable

      - name: Install dependencies
        run: flutter pub get
        working-directory: kalendr_app

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > kalendr_app/android/app/kalendr-release.keystore
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > kalendr_app/android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> kalendr_app/android/key.properties
          echo "keyAlias=kalendr" >> kalendr_app/android/key.properties
          echo "storeFile=kalendr-release.keystore" >> kalendr_app/android/key.properties

      - name: Build AAB
        run: flutter build appbundle --release
        working-directory: kalendr_app
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload to Play Store (Internal Track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.kalendr.kalendr_app
          releaseFiles: kalendr_app/build/app/outputs/bundle/release/app-release.aab
          track: internal

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: chalk-release-aab
          path: kalendr_app/build/app/outputs/bundle/release/app-release.aab
